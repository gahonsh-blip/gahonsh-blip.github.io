        <p>
            Professional Excel Automation, Premium PDF Design,
            Website Development, AI Solutions & Business Growth Services.
        </p>

        <div class="hero-buttons">
            <!-- Apple/Stripe-Inspired WhatsApp Conversion CTA -->
            <a href="https://wa.me/918825183628" target="_blank" class="btn-primary">
                <i class="fa-brands fa-whatsapp"></i> Start Project

                <h2>24/7</h2>
                <p>Global Support</p>

        </div>
    </div>
</section>

<style>
    /* --- HERO STYLING (STRIPE & LINEAR INSPIRED) --- */
    .hero {
        position: relative;
        min-height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #040814;
        overflow: hidden;
        padding: 120px 5% 60px;
    }

    #hero-particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }

    .mouse-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 255, 204, 0.08) 0%, rgba(0, 119, 255, 0.03) 50%, transparent 100%);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 2;
        transition: opacity 0.3s ease;
    }

    .hero-content {
        position: relative;
        z-index: 3;
        text-align: center;
        max-width: 900px;
    }

    /* Premium Badge */
    .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 16px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #00ffcc;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
    }

    /* Typography */
    .hero h1 {
        font-size: 4rem;
        font-weight: 800;
        line-height: 1.15;
        letter-spacing: -1px;
        color: #ffffff;
        margin-bottom: 24px;
    }

    .hero h1 span {
        background: linear-gradient(135deg, #00ffcc 0%, #0077ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .cursor {
        color: #00ffcc;
        animation: blink 0.7s infinite;
        font-weight: 300;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    .hero p {
        font-size: 1.25rem;
        color: #8a99ad;
        max-width: 680px;
        margin: 0 auto 40px;
        line-height: 1.6;
    }

    /* Premium Dual CTAs */
    .hero-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 60px;
    }

    .btn-primary, .btn-secondary {
        padding: 16px 36px;
        font-size: 1rem;
        font-weight: 700;
        border-radius: 50px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary {
        background: linear-gradient(135deg, #00ffcc 0%, #0077ff 100%);
        color: #040814;
        box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 255, 204, 0.4);
    }

    .btn-secondary {
        background: rgba(255, 255, 255, 0.03);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        color: #00ffcc;
        transform: translateY(-2px);
    }

    /* Glassmorphism Stats Cards */
    .hero-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 20px;
    }

    .stat-card {
        background: rgba(255, 255, 255, 0.01);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        padding: 25px;
        border-radius: 16px;
        transition: all 0.4s ease;
        cursor: pointer;
    }

    .stat-card:hover {
        background: rgba(255, 255, 255, 0.03);
        border-color: rgba(0, 255, 204, 0.3);
        transform: translateY(-5px);
    }

    .stat-card h2 {
        font-size: 2.5rem;
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 6px;
    }

    .stat-card p {
        font-size: 0.9rem;
        color: #8a99ad;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;

    /* Responsive */
    @media (max-width: 768px) {
        .hero h1 { font-size: 2.6rem; }

        .hero-buttons { flex-direction: column; gap: 15px; }
        .hero-stats { grid-template-columns: 1fr; gap: 15px; }
    }
</style>

<script>
    // --- 1. MOUSE FOLLOW GLOW TRACKING ---
    const heroContainer = document.getElementById('hero-canvas-container');
    const glow = document.getElementById('ambient-glow');

    heroContainer.addEventListener('mousemove', (e) => {
        const rect = heroContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        glow.style.left = `${x}px`;
        glow.style.top = `${y}px`;
    });

    // --- 2. PREMIUM TYPEWRITER EFFECT ---
    const words = ["Digital Success.", "Elite Automation.", "Premium Designs.", "Operational Scales."];
    let wordIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typewriterElement = document.getElementById('typewriter-text');

    function type() {
        const currentWord = words[wordIndex];
        if (isDeleting) {
            typewriterElement.textContent = currentWord.substring(0, charIndex - 1);
            charIndex--;
        } else {
            typewriterElement.textContent = currentWord.substring(0, charIndex + 1);
            charIndex++;
        }

        let typeSpeed = isDeleting ? 40 : 80;

        if (!isDeleting && charIndex === currentWord.length) {
            typeSpeed = 2000; // Pause at end of word
            isDeleting = true;
        } else if (isDeleting && charIndex === 0) {
            isDeleting = false;
            wordIndex = (wordIndex + 1) % words.length;
            typeSpeed = 400; // Pause before next word
        }

        setTimeout(type, typeSpeed);
    }
    document.addEventListener('DOMContentLoaded', () => type());

    // --- 3. DYNAMIC BACKGROUND PARTICLES SYSTEM ---
    const canvas = document.getElementById('hero-particles');
    const ctx = canvas.getContext('2d');
    let particlesArray = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5 + 0.5;
            this.speedX = Math.random() * 0.3 - 0.15;
            this.speedY = Math.random() * 0.3 - 0.15;
            this.color = Math.random() > 0.5 ? 'rgba(0, 255, 204, 0.3)' : 'rgba(0, 119, 255, 0.2)';
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0;
            else if (this.x < 0) this.x = canvas.width;
            if (this.y > canvas.height) this.y = 0;
            else if (this.y < 0) this.y = canvas.height;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    function initParticles() {
        particlesArray = [];
        const count = Math.floor((canvas.width * canvas.height) / 9000);
        for (let i = 0; i < count; i++) {
            particlesArray.push(new Particle());
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particlesArray.forEach(p => {
            p.update();
            p.draw();
        });
        requestAnimationFrame(animateParticles);
    }
    initParticles();
    animateParticles();

    // --- 4. SMART INTERACTIVE STATISTICS COUNTER ---
    const counters = document.querySelectorAll('.counter');
    const counterObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const target = +entry.target.getAttribute('data-target');
                let count = 0;
                const speed = target / 60; 
                
                const updateCount = () => {
                    count += speed;
                    if (count < target) {
                        entry.target.innerText = Math.floor(count);
                        setTimeout(updateCount, 16);
                    } else {
                        entry.target.innerText = target;
                    }
                };
                updateCount();
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.5 });

    counters.forEach(c => counterObserver.observe(c));
</script>
